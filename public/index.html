<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Hub - Third Sun</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --navy: #1a1a2e;
      --navy-deep: #12121f;
      --navy-mid: #232340;
      --rose: #c9a0a0;
      --rose-light: #dfc4b8;
      --rose-glow: rgba(201, 160, 160, 0.15);
      --copper: #d4a574;
      --copper-glow: rgba(212, 165, 116, 0.2);
      --text: #f0ebe4;
      --text-dim: #9b95a8;
      --text-muted: #5e5872;
      --glass: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.2);
      --glass-border-focus: rgba(201, 160, 160, 0.5);
      --input-bg: rgba(0, 0, 0, 0.45);
      --success: #7ec4a3;
      --success-bg: rgba(126, 196, 163, 0.1);
      --warning: #e4b87c;
      --warning-bg: rgba(228, 184, 124, 0.1);
      --danger: #d47b7b;
      --danger-bg: rgba(212, 123, 123, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: var(--navy-deep);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── Gradient background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 70% at 15% 20%, rgba(201, 140, 120, 0.25) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 75%, rgba(30, 28, 60, 0.9) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 50% 10%, rgba(180, 130, 110, 0.12) 0%, transparent 50%),
        linear-gradient(160deg, #2a1f2d 0%, #1a1a2e 30%, #12121f 70%, #0e0e1a 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Subtle grain texture ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.015;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── Glass card ── */
    .card, .app-container {
      position: relative;
      z-index: 1;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
    }

    .card {
      padding: 2.5rem;
      max-width: 440px;
      width: 100%;
      border-radius: 24px;
    }

    .app-container {
      padding: 2.25rem;
      max-width: 720px;
      width: 100%;
      border-radius: 2px 24px 2px 24px;
    }

    /* ── Warm glow edge ── */
    .card::before, .app-container::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px; right: -1px; bottom: -1px;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(201, 160, 160, 0.2) 0%, transparent 40%, transparent 60%, rgba(201, 160, 160, 0.05) 100%);
      z-index: -1;
      pointer-events: none;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      margin-bottom: 0.3rem;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--rose), var(--copper));
      border-radius: 4px;
      transform: rotate(45deg) scale(0.72);
    }

    .logo-mark svg {
      position: relative;
      width: 16px;
      height: 16px;
      fill: var(--navy-deep);
      z-index: 1;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.03em;
    }

    .tagline {
      color: var(--text-dim);
      font-size: 0.78rem;
      font-weight: 400;
      margin-bottom: 1.2rem;
      letter-spacing: 0.02em;
    }

    /* ── Tabs ── */
    .tab-bar {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      overflow: hidden;
    }

    .tab-btn {
      flex: 1;
      padding: 0.6rem 1rem;
      background: transparent;
      border: none;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.01em;
    }

    .tab-btn:not(:last-child) {
      border-right: 1px solid var(--glass-border);
    }

    .tab-btn:hover {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, rgba(201, 160, 160, 0.15), rgba(212, 165, 116, 0.1));
      color: var(--text);
      font-weight: 600;
    }

    .tab-view { display: none; }
    .tab-view.active { display: block; }

    /* ── Form elements ── */
    label {
      display: block;
      font-weight: 500;
      font-size: 0.7rem;
      margin-bottom: 0.4rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .auto-tag {
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      color: var(--success);
      font-size: 0.62rem;
      margin-left: 0.3rem;
    }

    .client-badge {
      display: none;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.9rem;
      padding: 0.55rem 0.85rem;
      background: rgba(201, 160, 160, 0.08);
      border: 1px solid rgba(201, 160, 160, 0.15);
      border-radius: 10px;
      font-size: 0.8rem;
      color: var(--rose-light);
      animation: fadeIn 0.2s ease;
    }

    .client-badge.no-match {
      background: rgba(255, 255, 255, 0.04);
      border-color: var(--glass-border);
      color: var(--text-dim);
    }
    .client-badge.no-match .org-name { color: var(--text-dim); font-weight: 400; }

    .client-badge .org-name { font-weight: 600; color: var(--text); }
    .client-badge .org-type {
      font-size: 0.68rem;
      color: var(--text-dim);
      padding: 0.1rem 0.45rem;
      background: rgba(255,255,255,0.05);
      border-radius: 100px;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.72rem 0.95rem;
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.88rem;
      color: var(--text);
      background: var(--input-bg);
      transition: all 0.25s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--glass-border-focus);
      box-shadow: 0 0 0 3px var(--rose-glow);
      background: rgba(0, 0, 0, 0.35);
    }

    textarea {
      width: 100%;
      padding: 0.95rem 1rem;
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 0.82rem;
      line-height: 1.65;
      color: var(--text);
      background: var(--input-bg);
      resize: vertical;
      min-height: 150px;
      transition: all 0.25s ease;
    }

    textarea:focus {
      outline: none;
      border-color: var(--glass-border-focus);
      box-shadow: 0 0 0 3px var(--rose-glow);
      background: rgba(0, 0, 0, 0.35);
    }

    textarea::placeholder, input::placeholder {
      color: var(--text-muted);
    }

    .field-group { margin-bottom: 0.9rem; }
    .field-row { display: flex; gap: 0.75rem; }
    .field-row .field-group { flex: 1; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.78rem 1.6rem;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: -0.01em;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--rose), var(--copper));
      color: var(--navy-deep);
      width: 100%;
      box-shadow: 0 4px 20px var(--copper-glow);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 30px rgba(212, 165, 116, 0.35);
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-primary:disabled {
      background: var(--navy-mid);
      box-shadow: none;
      cursor: not-allowed;
      color: var(--text-muted);
      transform: none;
      filter: none;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--glass-border);
    }

    .btn-ghost:hover {
      border-color: rgba(255, 255, 255, 0.15);
      color: var(--text);
      background: rgba(255, 255, 255, 0.03);
    }

    .btn-copy {
      background: linear-gradient(135deg, var(--rose), var(--copper));
      color: var(--navy-deep);
      width: 100%;
      box-shadow: 0 2px 12px var(--copper-glow);
    }

    .btn-copy:hover { filter: brightness(1.05); transform: translateY(-1px); }
    .btn-copy:active { transform: translateY(0); }
    .btn-copy.copied { background: var(--success); }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
      margin: 1.5rem 0;
    }

    /* ── Response ── */
    .response-area {
      display: none;
      margin-top: 0.25rem;
    }

    .response-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.6rem;
    }

    .response-label {
      font-weight: 500;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }

    .triage-badge {
      display: none;
      padding: 0.22rem 0.7rem;
      border-radius: 100px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .triage-badge.routine {
      display: inline-flex;
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid rgba(126, 196, 163, 0.2);
    }

    .triage-badge.needs-troy {
      display: inline-flex;
      background: var(--warning-bg);
      color: var(--warning);
      border: 1px solid rgba(228, 184, 124, 0.2);
    }

    .response-content {
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 1.1rem 1.2rem;
      min-height: 60px;
      max-height: 350px;
      overflow-y: auto;
      font-size: 0.88rem;
      line-height: 1.75;
      white-space: pre-wrap;
      color: var(--text);
    }

    .response-content::-webkit-scrollbar { width: 5px; }
    .response-content::-webkit-scrollbar-track { background: transparent; }
    .response-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    .response-content::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }

    /* ── Q&A answer area — markdown rendered ── */
    .qa-answer-content {
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 1.1rem 1.2rem;
      min-height: 60px;
      max-height: 400px;
      overflow-y: auto;
      font-size: 0.85rem;
      line-height: 1.75;
      color: var(--text);
    }

    .qa-answer-content::-webkit-scrollbar { width: 5px; }
    .qa-answer-content::-webkit-scrollbar-track { background: transparent; }
    .qa-answer-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    .qa-answer-content::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }

    .qa-answer-content h1, .qa-answer-content h2, .qa-answer-content h3 {
      color: var(--rose-light);
      margin: 1rem 0 0.4rem;
      font-weight: 600;
    }
    .qa-answer-content h1 { font-size: 1.1rem; }
    .qa-answer-content h2 { font-size: 0.95rem; }
    .qa-answer-content h3 { font-size: 0.88rem; }
    .qa-answer-content h1:first-child, .qa-answer-content h2:first-child, .qa-answer-content h3:first-child { margin-top: 0; }
    .qa-answer-content p { margin: 0.4rem 0; }
    .qa-answer-content ul, .qa-answer-content ol { padding-left: 1.3rem; margin: 0.4rem 0; }
    .qa-answer-content li { margin: 0.2rem 0; }
    .qa-answer-content strong { color: var(--text); font-weight: 600; }
    .qa-answer-content code {
      background: rgba(255, 255, 255, 0.06);
      padding: 0.15rem 0.35rem;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
    }
    .qa-answer-content a {
      color: var(--copper);
      text-decoration: none;
    }
    .qa-answer-content a:hover { text-decoration: underline; }

    .response-actions {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.75rem;
    }

    .response-actions .btn { flex: 1; }

    /* ── Spinner ── */
    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(26, 26, 46, 0.2);
      border-top-color: var(--navy-deep);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    .error-msg {
      display: none;
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid rgba(212, 123, 123, 0.2);
      padding: 0.6rem 0.9rem;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 500;
      margin-top: 0.75rem;
    }

    /* ── Success ── */
    .success-msg {
      display: none;
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid rgba(126, 196, 163, 0.2);
      padding: 0.6rem 0.9rem;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 500;
      margin-top: 0.75rem;
    }

    /* ── Streaming cursor ── */
    .streaming .response-content::after,
    .streaming .qa-answer-content::after {
      content: '';
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--rose);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* ── Category pills ── */
    .category-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 0.9rem;
    }

    .category-pill {
      padding: 0.35rem 0.75rem;
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      background: transparent;
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .category-pill:hover {
      border-color: rgba(201, 160, 160, 0.3);
      color: var(--text);
      background: rgba(201, 160, 160, 0.08);
    }

    .category-pill.active {
      border-color: var(--rose);
      color: var(--rose-light);
      background: rgba(201, 160, 160, 0.12);
    }

    /* ── Draft history ── */
    .history-item {
      padding: 0.6rem 0.85rem;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: border-color 0.2s ease;
      font-size: 0.8rem;
    }
    .history-item:hover { border-color: var(--glass-border-focus); }
    .history-item .history-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.3rem;
      color: var(--text-dim);
      font-size: 0.72rem;
    }
    .history-item .history-preview {
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Incident form ── */
    .incident-toggle {
      margin-top: 0.75rem;
      text-align: center;
    }

    .incident-toggle button {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.72rem;
      cursor: pointer;
      padding: 0.3rem 0.6rem;
      transition: color 0.2s ease;
    }

    .incident-toggle button:hover { color: var(--text-dim); }

    .incident-form {
      display: none;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--glass-border);
    }

    .incident-form .field-group { margin-bottom: 0.7rem; }

    .incident-form textarea {
      min-height: 80px;
      font-family: inherit;
      font-size: 0.82rem;
    }

    .incident-form input[type="text"],
    .incident-form select {
      font-size: 0.82rem;
    }

    select:focus {
      outline: none;
      border-color: var(--glass-border-focus);
      box-shadow: 0 0 0 3px var(--rose-glow);
      background: rgba(0, 0, 0, 0.35);
    }

    select option {
      background: var(--navy-mid);
      color: var(--text);
    }

    .hidden { display: none !important; }

    /* ── Login specific ── */
    #loginCard {
      text-align: center;
    }

    #loginCard .header {
      justify-content: center;
    }

    #loginCard .tagline {
      text-align: center;
    }

    #loginCard label {
      text-align: left;
    }

    /* ── Knowledge sub-nav ── */
    .knowledge-subnav {
      display: flex;
      gap: 0;
      margin-bottom: 1.2rem;
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      overflow: hidden;
    }

    .knowledge-subnav-btn {
      flex: 1;
      padding: 0.45rem 0.8rem;
      background: transparent;
      border: none;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .knowledge-subnav-btn:first-child { border-right: 1px solid var(--glass-border); }

    .knowledge-subnav-btn.active {
      background: rgba(201, 160, 160, 0.1);
      color: var(--text);
      font-weight: 600;
    }

    .knowledge-subview { display: none; }
    .knowledge-subview.active { display: block; }

    /* ── Knowledge browse ── */
    .kb-category-group { margin-bottom: 0.6rem; }

    .kb-category-header {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--rose-light);
      padding: 0.5rem 0.6rem;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease;
      user-select: none;
    }

    .kb-category-header:hover { border-color: var(--glass-border-focus); background: rgba(0,0,0,0.55); }

    .kb-category-header .section-count {
      font-weight: 400;
      font-size: 0.68rem;
      color: var(--text-muted);
    }

    .kb-category-header .kb-chevron {
      font-size: 0.65rem;
      color: var(--text-muted);
      transition: transform 0.2s ease;
      margin-left: 0.5rem;
    }

    .kb-category-group.expanded .kb-chevron { transform: rotate(90deg); }
    .kb-category-group.expanded .kb-category-header { border-radius: 8px 8px 0 0; border-bottom-color: transparent; }

    .kb-category-sections {
      display: none;
      padding: 0.4rem 0 0;
    }

    .kb-category-group.expanded .kb-category-sections { display: block; }

    .kb-section-card {
      padding: 0.6rem 0.85rem;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      margin-bottom: 0.4rem;
      cursor: pointer;
      transition: border-color 0.2s ease;
    }

    .kb-section-card:hover { border-color: var(--glass-border-focus); }

    .kb-section-title {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
    }

    .kb-section-content {
      display: none;
      margin-top: 0.5rem;
      font-size: 0.82rem;
      line-height: 1.65;
      color: var(--text-dim);
    }

    .kb-section-card.expanded .kb-section-content { display: block; }
    .kb-section-card.expanded { border-color: var(--glass-border-focus); }

    /* Reuse qa-answer-content styles inside browse sections */
    .kb-section-content h1, .kb-section-content h2, .kb-section-content h3 { color: var(--rose-light); margin: 0.8rem 0 0.3rem; font-weight: 600; }
    .kb-section-content h1 { font-size: 1rem; } .kb-section-content h2 { font-size: 0.9rem; } .kb-section-content h3 { font-size: 0.85rem; }
    .kb-section-content p { margin: 0.3rem 0; }
    .kb-section-content ul, .kb-section-content ol { padding-left: 1.3rem; margin: 0.3rem 0; }
    .kb-section-content li { margin: 0.15rem 0; }
    .kb-section-content strong { color: var(--text); font-weight: 600; }
    .kb-section-content code { background: rgba(255,255,255,0.06); padding: 0.15rem 0.35rem; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; }
    .kb-section-content a { color: var(--copper); text-decoration: none; }
    .kb-section-content a:hover { text-decoration: underline; }

    .kb-no-results {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.82rem;
      padding: 1.5rem 0;
    }

    /* ── Incident list cards ── */
    .incident-card {
      padding: 0.6rem 0.85rem;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      margin-bottom: 0.5rem;
    }

    .incident-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.25rem;
    }

    .incident-card-title {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
    }

    .incident-card-date {
      font-size: 0.68rem;
      color: var(--text-muted);
    }

    .severity-badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 100px;
      font-size: 0.62rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .severity-badge.critical { background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(212,123,123,0.2); }
    .severity-badge.high { background: var(--warning-bg); color: var(--warning); border: 1px solid rgba(228,184,124,0.2); }
    .severity-badge.medium { background: rgba(212,165,116,0.1); color: var(--copper); border: 1px solid rgba(212,165,116,0.2); }
    .severity-badge.low { background: var(--success-bg); color: var(--success); border: 1px solid rgba(126,196,163,0.2); }

    .incident-card-detail {
      font-size: 0.78rem;
      color: var(--text-dim);
      line-height: 1.5;
      margin-top: 0.2rem;
    }

    /* ── Q&A conversation thread ── */
    .qa-thread-container {
      max-height: 450px;
      overflow-y: auto;
      margin-bottom: 0.75rem;
    }

    .qa-thread-container::-webkit-scrollbar { width: 5px; }
    .qa-thread-container::-webkit-scrollbar-track { background: transparent; }
    .qa-thread-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    .qa-turn { margin-bottom: 0.75rem; }

    .qa-turn-question {
      padding: 0.6rem 0.85rem;
      background: rgba(201, 160, 160, 0.08);
      border: 1px solid rgba(201, 160, 160, 0.15);
      border-radius: 10px;
      font-size: 0.82rem;
      color: var(--rose-light);
      margin-bottom: 0.4rem;
    }

    .qa-turn-answer {
      padding: 0.8rem 1rem;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      font-size: 0.85rem;
      line-height: 1.75;
      color: var(--text);
    }

    .qa-turn-answer h1, .qa-turn-answer h2, .qa-turn-answer h3 { color: var(--rose-light); margin: 1rem 0 0.4rem; font-weight: 600; }
    .qa-turn-answer h1 { font-size: 1.1rem; } .qa-turn-answer h2 { font-size: 0.95rem; } .qa-turn-answer h3 { font-size: 0.88rem; }
    .qa-turn-answer h1:first-child, .qa-turn-answer h2:first-child, .qa-turn-answer h3:first-child { margin-top: 0; }
    .qa-turn-answer p { margin: 0.4rem 0; }
    .qa-turn-answer ul, .qa-turn-answer ol { padding-left: 1.3rem; margin: 0.4rem 0; }
    .qa-turn-answer li { margin: 0.2rem 0; }
    .qa-turn-answer strong { color: var(--text); font-weight: 600; }
    .qa-turn-answer code { background: rgba(255,255,255,0.06); padding: 0.15rem 0.35rem; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
    .qa-turn-answer a { color: var(--copper); text-decoration: none; }
    .qa-turn-answer a:hover { text-decoration: underline; }

    .qa-turn-actions {
      display: flex;
      gap: 0.4rem;
      margin-top: 0.4rem;
      justify-content: flex-end;
    }

    .qa-turn-actions .btn { padding: 0.25rem 0.6rem; font-size: 0.68rem; }

    .qa-turn-limit-warning {
      text-align: center;
      color: var(--warning);
      font-size: 0.75rem;
      padding: 0.5rem;
      background: var(--warning-bg);
      border: 1px solid rgba(228, 184, 124, 0.15);
      border-radius: 8px;
      margin-bottom: 0.75rem;
    }

    .kb-shortcut {
      font-size: 0.62rem;
      color: var(--text-muted);
      font-weight: 400;
      margin-left: 0.5rem;
      letter-spacing: 0.02em;
    }

    /* ── Quick Reference cards ── */
    .ref-client-card {
      padding: 0.6rem 0.85rem;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      margin-bottom: 0.4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
    }

    .ref-client-info { flex: 1; min-width: 0; }

    .ref-client-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
    }

    .ref-website-link {
      font-size: 0.75rem;
      color: var(--copper);
      text-decoration: none;
    }
    .ref-website-link:hover { text-decoration: underline; }

    .ref-badges { display: flex; gap: 0.35rem; flex-shrink: 0; }

    .ref-badge {
      display: inline-block;
      padding: 0.12rem 0.45rem;
      border-radius: 100px;
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      background: rgba(212,165,116,0.1);
      color: var(--copper);
      border: 1px solid rgba(212,165,116,0.2);
    }

    .ref-badge.type {
      background: var(--rose-glow);
      color: var(--rose);
      border-color: rgba(201,160,160,0.2);
    }

    .ref-doc-card {
      padding: 0.6rem 0.85rem;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      margin-bottom: 0.4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
    }

    .ref-doc-info { flex: 1; min-width: 0; }

    a.ref-doc-title {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--copper);
      text-decoration: none;
      display: block;
    }
    a.ref-doc-title:hover { text-decoration: underline; }

    .ref-doc-desc {
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-top: 0.1rem;
    }

    .ref-link-btn {
      padding: 0.25rem 0.6rem;
      font-size: 0.68rem;
      font-weight: 600;
      border: 1px solid var(--glass-border);
      border-radius: 6px;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s ease;
      flex-shrink: 0;
      font-family: inherit;
    }
    .ref-link-btn:hover { border-color: var(--copper); color: var(--copper); }
    .ref-link-btn.copied { border-color: var(--success); color: var(--success); }

    .ref-category-label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin: 1rem 0 0.4rem;
    }
    .ref-category-label:first-child { margin-top: 0.3rem; }

    .ref-count {
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-muted);
      padding: 0.5rem 0;
    }

    @media (max-width: 600px) {
      body { padding: 0.75rem; }
      .card { padding: 2rem; }
      .app-container { padding: 1.5rem; }
      .field-row { flex-direction: column; gap: 0; }
      .tab-btn { font-size: 0.72rem; padding: 0.5rem 0.6rem; }
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div class="card" id="loginCard">
    <div class="header">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-3 12H7c-.55 0-1-.45-1-1s.45-1 1-1h10c.55 0 1 .45 1 1s-.45 1-1 1zm0-3H7c-.55 0-1-.45-1-1s.45-1 1-1h10c.55 0 1 .45 1 1s-.45 1-1 1zm0-3H7c-.55 0-1-.45-1-1s.45-1 1-1h10c.55 0 1 .45 1 1s-.45 1-1 1z"/></svg>
      </div>
      <h1>Support Hub</h1>
    </div>
    <p class="tagline">Third Sun Productions</p>

    <form id="loginForm">
      <div class="field-group">
        <label for="password">Team Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
      <div class="error-msg" id="loginError"></div>
    </form>
  </div>

  <!-- App -->
  <div class="app-container hidden" id="appContainer">
    <div class="header">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-3 12H7c-.55 0-1-.45-1-1s.45-1 1-1h10c.55 0 1 .45 1 1s-.45 1-1 1zm0-3H7c-.55 0-1-.45-1-1s.45-1 1-1h10c.55 0 1 .45 1 1s-.45 1-1 1zm0-3H7c-.55 0-1-.45-1-1s.45-1 1-1h10c.55 0 1 .45 1 1s-.45 1-1 1z"/></svg>
      </div>
      <h1>Support Hub</h1>
    </div>
    <p class="tagline">Draft client replies or ask the knowledge base</p>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="draft">Draft Reply</button>
      <button class="tab-btn" data-tab="qa">Ask a Question</button>
      <button class="tab-btn" data-tab="incident">Log Incident</button>
      <button class="tab-btn" data-tab="knowledge">Knowledge Base</button>
      <button class="tab-btn" data-tab="reference">Quick Reference</button>
    </div>

    <!-- ═══ Draft Reply Tab ═══ -->
    <div class="tab-view active" id="draftView">
      <form id="draftForm">
        <div class="field-group">
          <label for="emailText">Client Email</label>
          <textarea id="emailText" placeholder="Paste the client's email here..." required></textarea>
        </div>

        <div class="client-badge" id="clientBadge">
          <span class="org-name" id="orgName"></span>
          <span class="org-type" id="orgType"></span>
        </div>

        <div class="field-row">
          <div class="field-group">
            <label for="clientName">Client Name <span class="auto-tag hidden" id="nameAutoTag">auto-detected</span></label>
            <input type="text" id="clientName" placeholder="e.g. Aimee" required>
          </div>
          <div class="field-group">
            <label for="siteUrl">Site URL <span class="auto-tag hidden" id="urlAutoTag">auto-detected</span></label>
            <input type="text" id="siteUrl" placeholder="e.g. uaf.org" required list="clientSuggestions">
            <datalist id="clientSuggestions"></datalist>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="draftBtn">
          <span id="draftBtnText">Draft Reply</span>
          <span class="kb-shortcut">⌘↵</span>
          <span class="spinner" id="draftSpinner"></span>
        </button>
        <div class="error-msg" id="draftError"></div>
      </form>

      <div class="response-area" id="responseArea">
        <div class="divider"></div>
        <div class="response-header">
          <span class="response-label">Draft Reply</span>
          <span class="triage-badge" id="triageBadge"></span>
        </div>
        <div class="response-content" id="responseContent"></div>
        <div class="response-actions">
          <button class="btn btn-copy" id="copyBtn">Copy to Clipboard</button>
          <button class="btn btn-ghost" id="startOverBtn">Start Over</button>
        </div>
      </div>

      <div id="draftHistory" style="display:none;">
        <div class="divider"></div>
        <div class="response-header" style="margin-bottom: 0.5rem;">
          <span class="response-label">Recent Drafts</span>
          <button class="btn btn-ghost" id="clearDraftHistoryBtn" style="padding: 0.3rem 0.7rem; font-size: 0.7rem;">Clear</button>
        </div>
        <div id="draftHistoryList"></div>
      </div>
    </div>

    <!-- ═══ Q&A Tab ═══ -->
    <div class="tab-view" id="qaView">
      <!-- Conversation thread (hidden until first answer) -->
      <div id="qaConversationThread" style="display:none;">
        <div class="response-header" style="margin-bottom: 0.6rem;">
          <span class="response-label">Conversation</span>
          <button class="btn btn-ghost" id="qaNewConversationBtn" style="padding: 0.3rem 0.7rem; font-size: 0.7rem;">New Conversation</button>
        </div>
        <div id="qaThreadContent" class="qa-thread-container"></div>
      </div>

      <!-- Streaming answer area (shown during generation) -->
      <div class="response-area" id="qaStreamingArea">
        <div class="divider"></div>
        <div class="qa-answer-content" id="qaStreamingContent"></div>
      </div>

      <form id="qaForm">
        <div class="field-group" id="qaCategoryGroup">
          <label>Category (optional)</label>
          <div class="category-pills" id="categoryPills">
            <button type="button" class="category-pill" data-category="Joomla">Joomla</button>
            <button type="button" class="category-pill" data-category="Hosting">Hosting</button>
            <button type="button" class="category-pill" data-category="Domains">Domains</button>
            <button type="button" class="category-pill" data-category="Troubleshooting">Troubleshooting</button>
            <button type="button" class="category-pill" data-category="Tools">Tools</button>
            <button type="button" class="category-pill" data-category="Admin">Admin</button>
          </div>
        </div>

        <div class="field-group">
          <label for="qaQuestion">Your Question</label>
          <textarea id="qaQuestion" placeholder="e.g. How do I add a custom field to an Event Booking registration form?" required style="min-height: 100px; font-family: inherit;"></textarea>
        </div>

        <button type="submit" class="btn btn-primary" id="qaBtn">
          <span id="qaBtnText">Ask</span>
          <span class="kb-shortcut">⌘↵</span>
          <span class="spinner" id="qaSpinner"></span>
        </button>
        <div class="error-msg" id="qaError"></div>
      </form>

      <div id="qaHistory" style="display:none;">
        <div class="divider"></div>
        <div class="response-header" style="margin-bottom: 0.5rem;">
          <span class="response-label">Recent Conversations</span>
          <button class="btn btn-ghost" id="clearQaHistoryBtn" style="padding: 0.3rem 0.7rem; font-size: 0.7rem;">Clear</button>
        </div>
        <div id="qaHistoryList"></div>
      </div>
    </div>

    <!-- ═══ Incident Tab ═══ -->
    <div class="tab-view" id="incidentView">
      <form id="incidentForm">
        <div class="field-group">
          <label for="incidentTitle">Title</label>
          <input type="text" id="incidentTitle" placeholder="e.g. Astroid Template Vulnerability" required>
        </div>

        <div class="field-row">
          <div class="field-group">
            <label for="incidentSeverity">Severity</label>
            <select id="incidentSeverity" style="width:100%;padding:0.72rem 0.95rem;border:1px solid var(--glass-border);border-radius:10px;font-family:inherit;font-size:0.82rem;color:var(--text);background:var(--input-bg);appearance:none;-webkit-appearance:none;cursor:pointer;">
              <option value="">Select...</option>
              <option value="Critical">Critical</option>
              <option value="High">High</option>
              <option value="Medium">Medium</option>
              <option value="Low">Low</option>
            </select>
          </div>
          <div class="field-group">
            <label for="incidentAffected">Affected</label>
            <input type="text" id="incidentAffected" placeholder="e.g. All CloudAccess sites">
          </div>
        </div>

        <div class="field-group">
          <label for="incidentDescription">Description</label>
          <textarea id="incidentDescription" placeholder="What happened?" required style="min-height: 100px; font-family: inherit;"></textarea>
        </div>

        <div class="field-group">
          <label for="incidentResolution">Resolution</label>
          <textarea id="incidentResolution" placeholder="How was it resolved? (Leave blank if still pending)" style="min-height: 70px; font-family: inherit;"></textarea>
        </div>

        <div class="field-group">
          <label for="incidentHandler">Handled By</label>
          <input type="text" id="incidentHandler" placeholder="e.g. Troy, Sabriel">
        </div>

        <button type="submit" class="btn btn-primary" id="incidentBtn">Log Incident <span class="kb-shortcut">⌘↵</span></button>
        <div class="error-msg" id="incidentError"></div>
        <div class="success-msg" id="incidentSuccess"></div>
      </form>

      <!-- Recent incidents list -->
      <div id="incidentList" style="display:none;">
        <div class="divider"></div>
        <div class="response-header" style="margin-bottom: 0.5rem;">
          <span class="response-label">Recent Incidents</span>
        </div>
        <div id="incidentListContent"></div>
      </div>
    </div>

    <!-- ═══ Knowledge Base Tab ═══ -->
    <div class="tab-view" id="knowledgeView">
      <!-- Sub-navigation -->
      <div class="knowledge-subnav">
        <button class="knowledge-subnav-btn active" data-subview="browse">Browse</button>
        <button class="knowledge-subnav-btn" data-subview="add">Add New</button>
      </div>

      <!-- Browse sub-view -->
      <div class="knowledge-subview active" id="knowledgeBrowseView">
        <div class="field-group">
          <input type="text" id="knowledgeSearchInput" placeholder="Search the knowledge base...">
        </div>
        <div class="category-pills" id="browseCategoryPills"></div>
        <div id="knowledgeBrowseResults"></div>
      </div>

      <!-- Add sub-view -->
      <div class="knowledge-subview" id="knowledgeAddView">
      <!-- Step 1: Input -->
      <div id="knowledgeInputStep">
        <form id="knowledgeFormatForm">
          <div class="field-group">
            <label for="knowledgeCategory">Category</label>
            <select id="knowledgeCategory" style="width:100%;padding:0.72rem 0.95rem;border:1px solid var(--glass-border);border-radius:10px;font-family:inherit;font-size:0.82rem;color:var(--text);background:var(--input-bg);appearance:none;-webkit-appearance:none;cursor:pointer;" required>
              <option value="">Select a knowledge file...</option>
              <option value="hosting">Hosting</option>
              <option value="domains">Domains & DNS</option>
              <option value="common-tasks">Common Tasks</option>
              <option value="joomla-components">Joomla Components</option>
              <option value="general-issues">General Issues & Troubleshooting</option>
              <option value="tools-accounts">Tools & Accounts</option>
              <option value="admin">Business Admin</option>
              <option value="help-docs">Help Docs & Training</option>
              <option value="example-replies">Example Replies</option>
            </select>
          </div>

          <div class="field-group">
            <label for="knowledgeContent">Paste anything <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-muted);font-size:0.62rem;margin-left:0.3rem;">Emails, notes, raw info — AI will format it</span></label>
            <textarea id="knowledgeContent" placeholder="Paste an email, meeting notes, or any raw info here. Claude will extract the useful bits and format them for the knowledge base." required style="min-height: 180px;"></textarea>
          </div>

          <button type="submit" class="btn btn-primary" id="knowledgeFormatBtn">
            <span id="knowledgeFormatBtnText">Format with AI</span>
            <span class="kb-shortcut">⌘↵</span>
            <span class="spinner" id="knowledgeFormatSpinner"></span>
          </button>
          <div class="error-msg" id="knowledgeError"></div>
        </form>
      </div>

      <!-- Step 2: Preview & Save -->
      <div id="knowledgePreviewStep" style="display:none;">
        <div class="field-group">
          <label>Preview <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-muted);font-size:0.62rem;margin-left:0.3rem;">Edit if needed before saving</span></label>
          <div class="qa-answer-content" id="knowledgePreviewRendered" style="margin-bottom: 0.75rem;"></div>
          <textarea id="knowledgePreviewRaw" style="min-height: 160px; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; display:none;"></textarea>
        </div>
        <div style="display: flex; gap: 0.6rem;">
          <button class="btn btn-primary" id="knowledgeSaveBtn" style="flex:1;">Save to Knowledge Base</button>
          <button class="btn btn-ghost" id="knowledgeEditToggle" style="flex:0 0 auto;">Edit</button>
          <button class="btn btn-ghost" id="knowledgeBackBtn" style="flex:0 0 auto;">Start Over</button>
        </div>
        <div class="error-msg" id="knowledgeSaveError"></div>
        <div class="success-msg" id="knowledgeSuccess"></div>
      </div>
      </div><!-- /knowledgeAddView -->
    </div>

    <!-- ═══ Quick Reference Tab ═══ -->
    <div class="tab-view" id="referenceView">
      <!-- Sub-navigation -->
      <div class="knowledge-subnav">
        <button class="knowledge-subnav-btn active" data-refview="clients">Clients</button>
        <button class="knowledge-subnav-btn" data-refview="helpdocs">Help Docs</button>
      </div>

      <!-- Clients sub-view -->
      <div class="knowledge-subview active" id="referenceClientsView">
        <div class="field-group">
          <input type="text" id="refClientSearch" placeholder="Search clients by name or website...">
        </div>
        <div id="refClientResults"></div>
      </div>

      <!-- Help Docs sub-view -->
      <div class="knowledge-subview" id="referenceHelpdocsView">
        <div class="field-group">
          <input type="text" id="refDocsSearch" placeholder="Search help docs and guides...">
        </div>
        <div id="refDocsResults"></div>
      </div>
    </div>
  </div>

<script>
  // ── DOM refs ──
  const loginCard = document.getElementById("loginCard");
  const appContainer = document.getElementById("appContainer");
  const loginForm = document.getElementById("loginForm");
  const loginBtn = document.getElementById("loginBtn");
  const loginError = document.getElementById("loginError");
  const passwordEl = document.getElementById("password");

  // Draft refs
  const draftForm = document.getElementById("draftForm");
  const draftBtn = document.getElementById("draftBtn");
  const draftBtnText = document.getElementById("draftBtnText");
  const draftSpinner = document.getElementById("draftSpinner");
  const draftError = document.getElementById("draftError");
  const emailTextEl = document.getElementById("emailText");

  // ── Helpers ──
  function escapeHtml(str) {
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  function formatTime(ts) {

  // ── Simple markdown to HTML ──
  function renderMarkdown(text) {
    let html = escapeHtml(text);
    // Headers
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    // Bold
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Links (markdown style first, then auto-link remaining bare URLs)
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    html = html.replace(/((?:^|[^"=]))(https?:\/\/[^\s<)]+)/gm, (match, prefix, url) => {
      if (prefix.endsWith('"') || prefix.endsWith('=')) return match;
      // Show clean label: strip protocol, www, trailing slash
      const label = url.replace(/^https?:\/\//, '').replace(/^www\./, '').replace(/\/$/, '');
      return prefix + '<a href="' + url + '" target="_blank" rel="noopener">' + label + '</a>';
    });
    // Unordered lists
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
    // Ordered lists
    html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
    // Paragraphs — wrap remaining lines
    html = html.replace(/^(?!<[hul]|<li)(.*\S.*)$/gm, '<p>$1</p>');
    // Clean up extra whitespace
    html = html.replace(/\n{2,}/g, '\n');
    return html;
  }

  // ══════════════════════════════════════════════════════
  // Auto-detect client name and website from pasted email
  // ══════════════════════════════════════════════════════
  function detectClientInfo(text) {
    const result = { name: null, url: null };
    const signoffPattern = /(?:thanks|thank you|sincerely|best|regards|cheers|warmly|respectfully|with gratitude)[,!]?\s*\n+\s*([A-Z][a-z]+(?:\s+[A-Z][a-z]+)?)/im;
    const signoffMatch = text.match(signoffPattern);
    if (signoffMatch) result.name = signoffMatch[1].trim();

    if (!result.name) {
      const letMeKnow = /let me know[,.]?\s*\n+\s*([A-Z][a-z]+(?:\s+[A-Z][a-z]+)?)/im;
      const lmkMatch = text.match(letMeKnow);
      if (lmkMatch) result.name = lmkMatch[1].trim();
    }

    const urlPattern = /(?:https?:\/\/)?(?:www\.)?([a-z0-9][-a-z0-9]*\.[a-z]{2,}(?:\.[a-z]{2,})?)/gi;
    const urls = [];
    let urlMatch;
    while ((urlMatch = urlPattern.exec(text)) !== null) {
      const domain = urlMatch[1].toLowerCase();
      if (!/thirdsun|gmail|yahoo|hotmail|outlook|google|stripe|scribehow/.test(domain)) urls.push(domain);
    }
    if (urls.length > 0) result.url = urls[0];
    return result;
  }

  function runDetection() {
    const text = emailTextEl.value;
    if (!text.trim()) return;
    const info = detectClientInfo(text);
    if (info.name && !clientNameEl.dataset.userEdited) {

      nameAutoTag.classList.remove("hidden");
    }
    if (info.url && !siteUrlEl.dataset.userEdited) {
      siteUrlEl.value = info.url;
      urlAutoTag.classList.remove("hidden");
      lookupClient(info.url);
    }
  }

  function lookupClient(urlValue) {
    if (!urlValue || !clientDirectory.length) {
      clientBadge.style.display = "none";
      clientBadge.classList.remove("no-match");
      return null;
    }
    const clean = urlValue.toLowerCase().replace(/^https?:\/\//, "").replace(/^www\./, "").replace(/\/.*$/, "").replace(/\/$/, "");
    const match = clientDirectory.find(c => {
      const cDomain = c.website.toLowerCase().replace(/^https?:\/\//, "").replace(/^www\./, "").replace(/\/.*$/, "").replace(/\/$/, "");
      if (clean === cDomain) return true;
      if (clean.endsWith("." + cDomain) || cDomain.endsWith("." + clean)) return true;
      return false;
    });
    if (match) {
      orgNameEl.textContent = match.name;
      orgTypeEl.textContent = match.type || "";
      orgTypeEl.style.display = match.type ? "inline" : "none";
      clientBadge.style.display = "flex";
      clientBadge.classList.remove("no-match");
      return match;
    } else {
      if (clean) {
        orgNameEl.textContent = "Client not found in directory";
        orgTypeEl.style.display = "none";
        clientBadge.style.display = "flex";
        clientBadge.classList.add("no-match");
      } else {
        clientBadge.style.display = "none";
        clientBadge.classList.remove("no-match");
      }
      return null;
    }
  }

  // ══════════════════════════════════════════════════════
  // SSE stream reader (shared)
  // ══════════════════════════════════════════════════════
  async function readSSEStream(res, onText, onDone, onError) {
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const jsonStr = line.slice(6);
        if (!jsonStr) continue;
        let data;
        try { data = JSON.parse(jsonStr); } catch { continue; }

        if (data.text) onText(data.text);
        if (data.done) onDone(data);
        if (data.error) onError(new Error(data.error));
      }
    }
  }

    if (currentAbortController) currentAbortController.abort();
    currentAbortController = new AbortController();

    try {
      const res = await fetch("/draft-reply", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: emailText,
          clientName: clientNameEl.value.trim() || undefined,
          siteUrl: siteUrlEl.value.trim() || undefined,
        }),
        signal: currentAbortController.signal,
      });

      if (!res.ok) { const d = await res.json(); throw new Error(d.error || "Request failed"); }

      responseArea.style.display = "block";
      responseArea.classList.add("streaming");

      await readSSEStream(res,
        (text) => {
          replyAccumulator += text;
          responseContent.textContent = replyAccumulator;
          responseContent.scrollTop = responseContent.scrollHeight;
        },
        (data) => {

    qaStreamingArea.classList.remove("streaming");
    qaStreamingContent.innerHTML = "";
    qaAccumulator = "";

    qaBtn.disabled = true;
    qaBtnText.textContent = "Thinking...";
    qaSpinner.style.display = "inline-block";

    if (currentAbortController) currentAbortController.abort();
    currentAbortController = new AbortController();

    try {
      const res = await fetch("/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          question,
          category: selectedCategory || undefined,
          history: qaConversationTurns.length > 0 ? qaConversationTurns : undefined,
        }),
        signal: currentAbortController.signal,
      });

      if (!res.ok) { const d = await res.json(); throw new Error(d.error || "Request failed"); }

      qaStreamingArea.style.display = "block";
      qaStreamingArea.classList.add("streaming");

      await readSSEStream(res,
        (text) => {
          qaAccumulator += text;
          qaStreamingContent.innerHTML = renderMarkdown(qaAccumulator);
          qaStreamingContent.scrollTop = qaStreamingContent.scrollHeight;
        },
        () => {
          qaStreamingArea.classList.remove("streaming");

          // Add to conversation
          qaConversationTurns.push({ role: "user", content: question });
          qaConversationTurns.push({ role: "assistant", content: qaAccumulator });
          qaConversationDisplay.push({ question, answer: qaAccumulator });

          // Update thread display
          renderConversationThread();

          // Hide streaming area (content is now in the thread)
          qaStreamingArea.style.display = "none";

          // Clear the input for follow-up
          qaQuestion.value = "";
          qaQuestion.focus();
        },
        (err) => { throw err; }
      );
    } catch (err) {
      qaStreamingArea.classList.remove("streaming");
      if (err.name === "AbortError") return;
      qaError.textContent = err.message;
      qaError.style.display = "block";
    } finally {
      qaBtn.disabled = false;
      qaBtnText.textContent = isInConversation() ? "Ask Follow-up" : "Ask";
      qaSpinner.style.display = "none";
    }
  });

  // ══════════════════════════════════════════════════════
  // Incident — submit
  // ══════════════════════════════════════════════════════
  incidentForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    incidentError.style.display = "none";
    incidentSuccess.style.display = "none";
    incidentBtn.disabled = true;

    try {
      const res = await fetch("/incidents", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          title: document.getElementById("incidentTitle").value.trim(),
          severity: document.getElementById("incidentSeverity").value.trim() || undefined,
          affected: document.getElementById("incidentAffected").value.trim() || undefined,
          description: document.getElementById("incidentDescription").value.trim(),
          resolution: document.getElementById("incidentResolution").value.trim() || undefined,
          handler: document.getElementById("incidentHandler").value.trim() || undefined,
        }),
      });

      if (!res.ok) { const d = await res.json(); throw new Error(d.error || "Failed to log incident"); }

      const data = await res.json();
      incidentSuccess.textContent = `Incident "${data.title}" logged for ${data.date}. It's now part of the knowledge base.`;
      incidentSuccess.style.display = "block";
      incidentForm.reset();
      loadIncidents();
    } catch (err) {
      incidentError.textContent = err.message;
      incidentError.style.display = "block";
    } finally {
      incidentBtn.disabled = false;
    }
  });

  // ══════════════════════════════════════════════════════
  // Add Knowledge — Step 1: Format with AI
  // ══════════════════════════════════════════════════════
  knowledgeFormatForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    knowledgeError.style.display = "none";
    knowledgeFormatBtn.disabled = true;
    knowledgeFormatBtnText.textContent = "Formatting...";
    knowledgeFormatSpinner.style.display = "inline-block";

    try {
      const res = await fetch("/knowledge/format", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          category: document.getElementById("knowledgeCategory").value.trim(),
          content: document.getElementById("knowledgeContent").value.trim(),
        }),
      });

      if (!res.ok) { const d = await res.json(); throw new Error(d.error || "Failed to format content"); }

      const data = await res.json();
      knowledgeFormatted = data;

      // Show preview step
      knowledgePreviewRendered.innerHTML = renderMarkdown(data.formatted);
      knowledgePreviewRaw.value = data.formatted;
      knowledgePreviewRaw.style.display = "none";
      knowledgeEditToggle.textContent = "Edit";
      knowledgeInputStep.style.display = "none";
      knowledgePreviewStep.style.display = "block";
      knowledgeSuccess.style.display = "none";
      knowledgeSaveError.style.display = "none";
    } catch (err) {
      knowledgeError.textContent = err.message;
      knowledgeError.style.display = "block";
    } finally {
      knowledgeFormatBtn.disabled = false;
      knowledgeFormatBtnText.textContent = "Format with AI";
      knowledgeFormatSpinner.style.display = "none";
    }
  });

  // ══════════════════════════════════════════════════════
  // Add Knowledge — Step 2: Preview actions
  // ══════════════════════════════════════════════════════
  knowledgeEditToggle.addEventListener("click", () => {
    const isEditing = knowledgePreviewRaw.style.display !== "none";
    if (isEditing) {
      // Switch back to rendered preview, update from raw textarea
      knowledgeFormatted.formatted = knowledgePreviewRaw.value;
      const lines = knowledgeFormatted.formatted.split("\n");
      knowledgeFormatted.title = lines[0].replace(/^#+\s*/, "").trim();
      knowledgePreviewRendered.innerHTML = renderMarkdown(knowledgeFormatted.formatted);
      knowledgePreviewRaw.style.display = "none";
      knowledgePreviewRendered.style.display = "block";
      knowledgeEditToggle.textContent = "Edit";
    } else {
      // Switch to raw edit mode
      knowledgePreviewRendered.style.display = "none";
      knowledgePreviewRaw.style.display = "block";
      knowledgeEditToggle.textContent = "Preview";
      knowledgePreviewRaw.focus();
    }
  });

  knowledgeBackBtn.addEventListener("click", () => {
    knowledgePreviewStep.style.display = "none";
    knowledgeInputStep.style.display = "block";
    knowledgeFormatted = null;
    knowledgeSuccess.style.display = "none";
    knowledgeSaveError.style.display = "none";
  });

  knowledgeSaveBtn.addEventListener("click", async () => {
    if (!knowledgeFormatted) return;
    knowledgeSaveError.style.display = "none";
    knowledgeSuccess.style.display = "none";
    knowledgeSaveBtn.disabled = true;

    // If in edit mode, grab latest from textarea
    if (knowledgePreviewRaw.style.display !== "none") {
      knowledgeFormatted.formatted = knowledgePreviewRaw.value;
      const lines = knowledgeFormatted.formatted.split("\n");
      knowledgeFormatted.title = lines[0].replace(/^#+\s*/, "").trim();
    }

    try {
      const res = await fetch("/knowledge", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          category: knowledgeFormatted.category,
          content: knowledgeFormatted.formatted,
        }),
      });

      if (!res.ok) { const d = await res.json(); throw new Error(d.error || "Failed to save knowledge"); }

      const data = await res.json();
      knowledgeSuccess.textContent = `Added "${data.title}" to ${data.category}. It's now part of the knowledge base.`;
      knowledgeSuccess.style.display = "block";
      knowledgeSaveBtn.disabled = true;
      knowledgeSaveBtn.textContent = "Saved!";
      setTimeout(() => {
        // Reset everything
        knowledgePreviewStep.style.display = "none";
        knowledgeInputStep.style.display = "block";
        knowledgeFormatted = null;
        knowledgeSaveBtn.disabled = false;
        knowledgeSaveBtn.textContent = "Save to Knowledge Base";
        knowledgeSuccess.style.display = "none";
        knowledgeFormatForm.reset();
        knowledgeIndex = null; // invalidate browse cache
      }, 3000);
    } catch (err) {
      knowledgeSaveError.textContent = err.message;
      knowledgeSaveError.style.display = "block";
    } finally {
      if (knowledgeSaveBtn.textContent !== "Saved!") knowledgeSaveBtn.disabled = false;
    }
  });

  // ══════════════════════════════════════════════════════
  // Action buttons
  // ══════════════════════════════════════════════════════
  copyBtn.addEventListener("click", async () => {
    try { await navigator.clipboard.writeText(replyAccumulator); }
    catch {
      const ta = document.createElement("textarea");
      ta.value = replyAccumulator;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }
    copyBtn.textContent = "Copied!";
    copyBtn.classList.add("copied");
    setTimeout(() => { copyBtn.textContent = "Copy to Clipboard"; copyBtn.classList.remove("copied"); }, 2000);
  });

  startOverBtn.addEventListener("click", () => {
    responseArea.style.display = "none";
    responseArea.classList.remove("streaming");
    draftError.style.display = "none";
    emailTextEl.value = "";
    clientNameEl.value = "";
    siteUrlEl.value = "";
    delete clientNameEl.dataset.userEdited;
    delete siteUrlEl.dataset.userEdited;
    nameAutoTag.classList.add("hidden");
    urlAutoTag.classList.add("hidden");
    clientBadge.style.display = "none";
    clientBadge.classList.remove("no-match");
    replyAccumulator = "";
    responseContent.textContent = "";
    triageBadge.style.display = "none";
    triageBadge.className = "triage-badge";
    emailTextEl.focus();
  });

  // ══════════════════════════════════════════════════════
  // Incidents — Recent list
  // ══════════════════════════════════════════════════════
  async function loadIncidents() {
    try {
      const res = await fetch("/incidents");
      if (!res.ok) return;
      const incidents = await res.json();
      if (!incidents.length) { incidentList.style.display = "none"; return; }

      incidentList.style.display = "block";
      incidentListContent.innerHTML = incidents.map(inc => {
        const severityClass = (inc.severity || "").toLowerCase();
        return `<div class="incident-card">
          <div class="incident-card-header">
            <span class="incident-card-title">${escapeHtml(inc.title)}</span>
            <span class="severity-badge ${severityClass}">${escapeHtml(inc.severity)}</span>
          </div>
          <div class="incident-card-date">${escapeHtml(inc.date)} &middot; ${escapeHtml(inc.affected)} &middot; ${escapeHtml(inc.handler)}</div>
          <div class="incident-card-detail">${escapeHtml(inc.description)}</div>
        </div>`;
      }).join("");
    } catch { /* silent fail */ }
  }

  // ══════════════════════════════════════════════════════
  // Knowledge Base — Browse
  // ══════════════════════════════════════════════════════
  let knowledgeIndex = null;
  let browseSelectedCategory = null;

  // Sub-navigation switching (scoped to Knowledge Base tab only)
  document.querySelectorAll("[data-subview]").forEach(btn => {
    btn.addEventListener("click", () => {
      const nav = btn.closest(".knowledge-subnav");
      nav.querySelectorAll(".knowledge-subnav-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("knowledgeBrowseView").classList.toggle("active", btn.dataset.subview === "browse");
      document.getElementById("knowledgeAddView").classList.toggle("active", btn.dataset.subview === "add");
      if (btn.dataset.subview === "browse" && !knowledgeIndex) loadKnowledgeIndex();
    });
  });

  async function loadKnowledgeIndex() {
    try {
      const res = await fetch("/knowledge/browse");
      if (!res.ok) throw new Error("Failed to load");
      knowledgeIndex = await res.json();

      // Build category pills
      browseCategoryPills.innerHTML = knowledgeIndex.map(cat =>
        `<button type="button" class="category-pill" data-browse-category="${cat.category}">${escapeHtml(cat.label)}</button>`
      ).join("");

      renderKnowledgeBrowse();
    } catch {
      knowledgeBrowseResults.innerHTML = '<div class="kb-no-results">Failed to load knowledge base. Please try again.</div>';
    }
  }

  browseCategoryPills.addEventListener("click", (e) => {
    const pill = e.target.closest(".category-pill");
    if (!pill) return;
    if (pill.classList.contains("active")) {
      pill.classList.remove("active");
      browseSelectedCategory = null;
    } else {
      browseCategoryPills.querySelectorAll(".category-pill").forEach(p => p.classList.remove("active"));
      pill.classList.add("active");
      browseSelectedCategory = pill.dataset.browseCategory;
    }
    renderKnowledgeBrowse();
  });

  knowledgeSearchInput.addEventListener("input", () => renderKnowledgeBrowse());

  function renderKnowledgeBrowse() {
    if (!knowledgeIndex) return;

    const query = (knowledgeSearchInput.value || "").toLowerCase().trim();
    let hasResults = false;
    let html = "";

    for (const cat of knowledgeIndex) {
      if (browseSelectedCategory && cat.category !== browseSelectedCategory) continue;

      const matchingSections = cat.sections.filter(s => {
        if (!query) return true;
        return s.title.toLowerCase().includes(query) || s.content.toLowerCase().includes(query);
      });

      if (matchingSections.length === 0) continue;
      hasResults = true;

      const isExpanded = query ? " expanded" : "";
      html += `<div class="kb-category-group${isExpanded}">`;
      html += `<div class="kb-category-header" onclick="this.parentElement.classList.toggle('expanded')">`;
      html += `<span>${escapeHtml(cat.label)}</span>`;
      html += `<span><span class="section-count">${matchingSections.length} section${matchingSections.length !== 1 ? "s" : ""}</span><span class="kb-chevron">&#9654;</span></span>`;
      html += `</div>`;
      html += `<div class="kb-category-sections">`;

      for (const section of matchingSections) {
        html += `<div class="kb-section-card" onclick="this.classList.toggle('expanded')">`;
        html += `<div class="kb-section-title">${escapeHtml(section.title)}</div>`;
        html += `<div class="kb-section-content">${renderMarkdown(section.content)}</div>`;
        html += `</div>`;
      }

      html += `</div></div>`;
    }

    if (!hasResults) {
      html = `<div class="kb-no-results">${query ? 'No results for "' + escapeHtml(query) + '"' : "No knowledge entries found."}</div>`;
    }

    knowledgeBrowseResults.innerHTML = html;
  }

  // ══════════════════════════════════════════════════════
  // Quick Reference — Clients & Help Docs
  // ══════════════════════════════════════════════════════
  let helpDocsData = null;
  let referenceInited = false;

  // Sub-navigation switching for reference tab
  document.querySelectorAll("[data-refview]").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("[data-refview]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("referenceClientsView").classList.toggle("active", btn.dataset.refview === "clients");
      document.getElementById("referenceHelpdocsView").classList.toggle("active", btn.dataset.refview === "helpdocs");
      if (btn.dataset.refview === "helpdocs" && !helpDocsData) loadHelpDocs();
    });
  });

  function initReferenceTab() {
    if (referenceInited) return;
    referenceInited = true;
    renderClientDirectory();
  }

  // ── Clients ──
  const refClientSearch = document.getElementById("refClientSearch");
  const refClientResults = document.getElementById("refClientResults");

  refClientSearch.addEventListener("input", () => renderClientDirectory());

  function renderClientDirectory() {
    if (!clientDirectory.length) {
      refClientResults.innerHTML = '<div class="kb-no-results">Loading clients...</div>';
      return;
    }

    const query = (refClientSearch.value || "").toLowerCase().trim();
    const filtered = clientDirectory.filter(c => {
      if (!query) return true;
      return c.name.toLowerCase().includes(query)
        || c.website.toLowerCase().includes(query)
        || (c.type || "").toLowerCase().includes(query)
        || (c.joomla || "").toLowerCase().includes(query);
    });

    if (!filtered.length) {
      refClientResults.innerHTML = `<div class="kb-no-results">No clients match "${escapeHtml(query)}"</div>`;
      return;
    }

    let html = `<div class="ref-count">${filtered.length} client${filtered.length !== 1 ? "s" : ""}</div>`;
    for (const c of filtered) {
      const jBadge = c.joomla ? `<span class="ref-badge">Joomla ${escapeHtml(c.joomla)}</span>` : "";
      const tBadge = c.type ? `<span class="ref-badge type">${escapeHtml(c.type)}</span>` : "";
      html += `<div class="ref-client-card">
        <div class="ref-client-info">
          <div class="ref-client-name">${escapeHtml(c.name)}</div>
          <a class="ref-website-link" href="https://${escapeHtml(c.website)}" target="_blank" rel="noopener">${escapeHtml(c.website)}</a>
        </div>
        <div class="ref-badges">${tBadge}${jBadge}</div>
      </div>`;
    }
    refClientResults.innerHTML = html;
  }

  // ── Help Docs ──
  const refDocsSearch = document.getElementById("refDocsSearch");
  const refDocsResults = document.getElementById("refDocsResults");

  refDocsSearch.addEventListener("input", () => renderHelpDocs());

  async function loadHelpDocs() {
    try {
      const res = await fetch("/help-docs");
      if (!res.ok) throw new Error("Failed to load");
      helpDocsData = await res.json();
      renderHelpDocs();
    } catch {
      refDocsResults.innerHTML = '<div class="kb-no-results">Failed to load help docs. Please try again.</div>';
    }
  }

  function renderHelpDocs() {
    if (!helpDocsData) return;

    const query = (refDocsSearch.value || "").toLowerCase().trim();
    let html = "";

    // Help doc pages
    const filteredPages = helpDocsData.pages.filter(p => {
      if (!query) return true;
      return p.title.toLowerCase().includes(query) || p.description.toLowerCase().includes(query);
    });

    if (filteredPages.length > 0) {
      html += `<div class="ref-category-label">Help Doc Pages</div>`;
      for (const p of filteredPages) {
        html += renderDocCard(p);
      }
    }

    // Scribe guides grouped by category
    const filteredGuides = helpDocsData.guides.filter(g => {
      if (!query) return true;
      return g.title.toLowerCase().includes(query) || g.description.toLowerCase().includes(query) || g.category.toLowerCase().includes(query);
    });

    if (filteredGuides.length > 0) {
      const byCategory = {};
      for (const g of filteredGuides) {
        if (!byCategory[g.category]) byCategory[g.category] = [];
        byCategory[g.category].push(g);
      }
      for (const [cat, guides] of Object.entries(byCategory)) {
        html += `<div class="ref-category-label">${escapeHtml(cat)}</div>`;
        for (const g of guides) {
          html += renderDocCard(g);
        }
      }
    }

    if (!filteredPages.length && !filteredGuides.length) {
      html = `<div class="kb-no-results">${query ? 'No docs match "' + escapeHtml(query) + '"' : "No help docs found."}</div>`;
    }

    refDocsResults.innerHTML = html;
  }

  function renderDocCard(doc) {
    return `<div class="ref-doc-card">
      <div class="ref-doc-info">
        <a class="ref-doc-title" href="${escapeHtml(doc.url)}" target="_blank" rel="noopener">${escapeHtml(doc.title)}</a>
        <div class="ref-doc-desc">${escapeHtml(doc.description)}</div>
      </div>
      <button class="ref-link-btn" onclick="copyDocLink(this, '${escapeHtml(doc.url)}')">Copy Link</button>
    </div>`;
  }

  function copyDocLink(btn, url) {
    try { navigator.clipboard.writeText(url); }
    catch {
      const ta = document.createElement("textarea");
      ta.value = url;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }
    btn.textContent = "Copied!";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Copy Link"; btn.classList.remove("copied"); }, 1500);
  }
</script>
</body>
</html>
