<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Hub - Third Sun</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --navy: #1a1a2e;
      --navy-deep: #12121f;
      --navy-mid: #232340;
      --rose: #c9a0a0;
      --rose-light: #dfc4b8;
      --rose-glow: rgba(201, 160, 160, 0.15);
      --copper: #d4a574;
      --copper-glow: rgba(212, 165, 116, 0.2);
      --text: #f0ebe4;
      --text-dim: #9b95a8;
      --text-muted: #5e5872;
      --glass: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-border-focus: rgba(201, 160, 160, 0.35);
      --input-bg: rgba(0, 0, 0, 0.25);
      --success: #7ec4a3;
      --success-bg: rgba(126, 196, 163, 0.1);
      --warning: #e4b87c;
      --warning-bg: rgba(228, 184, 124, 0.1);
      --danger: #d47b7b;
      --danger-bg: rgba(212, 123, 123, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: var(--navy-deep);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── Gradient background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 70% at 15% 20%, rgba(201, 140, 120, 0.25) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 75%, rgba(30, 28, 60, 0.9) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 50% 10%, rgba(180, 130, 110, 0.12) 0%, transparent 50%),
        linear-gradient(160deg, #2a1f2d 0%, #1a1a2e 30%, #12121f 70%, #0e0e1a 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Subtle grain texture ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.015;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── Glass card ── */
    .card, .app-container {
      position: relative;
      z-index: 1;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
    }

    .card {
      padding: 2.5rem;
      max-width: 440px;
      width: 100%;
      border-radius: 24px;
    }

    .app-container {
      padding: 2.25rem;
      max-width: 720px;
      width: 100%;
      border-radius: 2px 24px 2px 24px;
    }

    /* ── Warm glow edge ── */
    .card::before, .app-container::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px; right: -1px; bottom: -1px;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(201, 160, 160, 0.2) 0%, transparent 40%, transparent 60%, rgba(201, 160, 160, 0.05) 100%);
      z-index: -1;
      pointer-events: none;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      margin-bottom: 0.3rem;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--rose), var(--copper));
      border-radius: 4px;
      transform: rotate(45deg) scale(0.72);
    }

    .logo-mark svg {
      position: relative;
      width: 16px;
      height: 16px;
      fill: var(--navy-deep);
      z-index: 1;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.03em;
    }

    .tagline {
      color: var(--text-dim);
      font-size: 0.78rem;
      font-weight: 400;
      margin-bottom: 1.2rem;
      letter-spacing: 0.02em;
    }

    /* ── Tabs ── */
    .tab-bar {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      overflow: hidden;
    }

    .tab-btn {
      flex: 1;
      padding: 0.6rem 1rem;
      background: transparent;
      border: none;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.01em;
    }

    .tab-btn:not(:last-child) {
      border-right: 1px solid var(--glass-border);
    }

    .tab-btn:hover {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, rgba(201, 160, 160, 0.15), rgba(212, 165, 116, 0.1));
      color: var(--text);
      font-weight: 600;
    }

    .tab-view { display: none; }
    .tab-view.active { display: block; }

    /* ── Form elements ── */
    label {
      display: block;
      font-weight: 500;
      font-size: 0.7rem;
      margin-bottom: 0.4rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .auto-tag {
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      color: var(--success);
      font-size: 0.62rem;
      margin-left: 0.3rem;
    }

    .client-badge {
      display: none;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.9rem;
      padding: 0.55rem 0.85rem;
      background: rgba(201, 160, 160, 0.08);
      border: 1px solid rgba(201, 160, 160, 0.15);
      border-radius: 10px;
      font-size: 0.8rem;
      color: var(--rose-light);
      animation: fadeIn 0.2s ease;
    }

    .client-badge.no-match {
      background: rgba(255, 255, 255, 0.04);
      border-color: var(--glass-border);
      color: var(--text-dim);
    }
    .client-badge.no-match .org-name { color: var(--text-dim); font-weight: 400; }

    .client-badge .org-name { font-weight: 600; color: var(--text); }
    .client-badge .org-type {
      font-size: 0.68rem;
      color: var(--text-dim);
      padding: 0.1rem 0.45rem;
      background: rgba(255,255,255,0.05);
      border-radius: 100px;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.72rem 0.95rem;
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.88rem;
      color: var(--text);
      background: var(--input-bg);
      transition: all 0.25s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--glass-border-focus);
      box-shadow: 0 0 0 3px var(--rose-glow);
      background: rgba(0, 0, 0, 0.35);
    }

    textarea {
      width: 100%;
      padding: 0.95rem 1rem;
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 0.82rem;
      line-height: 1.65;
      color: var(--text);
      background: var(--input-bg);
      resize: vertical;
      min-height: 150px;
      transition: all 0.25s ease;
    }

    textarea:focus {
      outline: none;
      border-color: var(--glass-border-focus);
      box-shadow: 0 0 0 3px var(--rose-glow);
      background: rgba(0, 0, 0, 0.35);
    }

    textarea::placeholder, input::placeholder {
      color: var(--text-muted);
    }

    .field-group { margin-bottom: 0.9rem; }
    .field-row { display: flex; gap: 0.75rem; }
    .field-row .field-group { flex: 1; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.78rem 1.6rem;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: -0.01em;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--rose), var(--copper));
      color: var(--navy-deep);
      width: 100%;
      box-shadow: 0 4px 20px var(--copper-glow);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 30px rgba(212, 165, 116, 0.35);
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-primary:disabled {
      background: var(--navy-mid);
      box-shadow: none;
      cursor: not-allowed;
      color: var(--text-muted);
      transform: none;
      filter: none;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--glass-border);
    }

    .btn-ghost:hover {
      border-color: rgba(255, 255, 255, 0.15);
      color: var(--text);
      background: rgba(255, 255, 255, 0.03);
    }

    .btn-copy {
      background: linear-gradient(135deg, var(--rose), var(--copper));
      color: var(--navy-deep);
      width: 100%;
      box-shadow: 0 2px 12px var(--copper-glow);
    }

    .btn-copy:hover { filter: brightness(1.05); transform: translateY(-1px); }
    .btn-copy:active { transform: translateY(0); }
    .btn-copy.copied { background: var(--success); }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
      margin: 1.5rem 0;
    }

    /* ── Response ── */
    .response-area {
      display: none;
      margin-top: 0.25rem;
    }

    .response-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.6rem;
    }

    .response-label {
      font-weight: 500;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }

    .triage-badge {
      display: none;
      padding: 0.22rem 0.7rem;
      border-radius: 100px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .triage-badge.routine {
      display: inline-flex;
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid rgba(126, 196, 163, 0.2);
    }

    .triage-badge.needs-troy {
      display: inline-flex;
      background: var(--warning-bg);
      color: var(--warning);
      border: 1px solid rgba(228, 184, 124, 0.2);
    }

    .response-content {
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 1.1rem 1.2rem;
      min-height: 60px;
      max-height: 350px;
      overflow-y: auto;
      font-size: 0.88rem;
      line-height: 1.75;
      white-space: pre-wrap;
      color: var(--text);
    }

    .response-content::-webkit-scrollbar { width: 5px; }
    .response-content::-webkit-scrollbar-track { background: transparent; }
    .response-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    .response-content::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }

    /* ── Q&A answer area — markdown rendered ── */
    .qa-answer-content {
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 1.1rem 1.2rem;
      min-height: 60px;
      max-height: 400px;
      overflow-y: auto;
      font-size: 0.85rem;
      line-height: 1.75;
      color: var(--text);
    }

    .qa-answer-content::-webkit-scrollbar { width: 5px; }
    .qa-answer-content::-webkit-scrollbar-track { background: transparent; }
    .qa-answer-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    .qa-answer-content::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }

    .qa-answer-content h1, .qa-answer-content h2, .qa-answer-content h3 {
      color: var(--rose-light);
      margin: 1rem 0 0.4rem;
      font-weight: 600;
    }
    .qa-answer-content h1 { font-size: 1.1rem; }
    .qa-answer-content h2 { font-size: 0.95rem; }
    .qa-answer-content h3 { font-size: 0.88rem; }
    .qa-answer-content h1:first-child, .qa-answer-content h2:first-child, .qa-answer-content h3:first-child { margin-top: 0; }
    .qa-answer-content p { margin: 0.4rem 0; }
    .qa-answer-content ul, .qa-answer-content ol { padding-left: 1.3rem; margin: 0.4rem 0; }
    .qa-answer-content li { margin: 0.2rem 0; }
    .qa-answer-content strong { color: var(--text); font-weight: 600; }
    .qa-answer-content code {
      background: rgba(255, 255, 255, 0.06);
      padding: 0.15rem 0.35rem;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
    }
    .qa-answer-content a {
      color: var(--copper);
      text-decoration: none;
    }
    .qa-answer-content a:hover { text-decoration: underline; }

    .response-actions {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.75rem;
    }

    .response-actions .btn { flex: 1; }

    /* ── Spinner ── */
    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(26, 26, 46, 0.2);
      border-top-color: var(--navy-deep);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    .error-msg {
      display: none;
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid rgba(212, 123, 123, 0.2);
      padding: 0.6rem 0.9rem;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 500;
      margin-top: 0.75rem;
    }

    /* ── Success ── */
    .success-msg {
      display: none;
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid rgba(126, 196, 163, 0.2);
      padding: 0.6rem 0.9rem;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 500;
      margin-top: 0.75rem;
    }

    /* ── Streaming cursor ── */
    .streaming .response-content::after,
    .streaming .qa-answer-content::after {
      content: '';
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--rose);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* ── Category pills ── */
    .category-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 0.9rem;
    }

    .category-pill {
      padding: 0.35rem 0.75rem;
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      background: transparent;
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .category-pill:hover {
      border-color: rgba(201, 160, 160, 0.3);
      color: var(--text);
      background: rgba(201, 160, 160, 0.08);
    }

    .category-pill.active {
      border-color: var(--rose);
      color: var(--rose-light);
      background: rgba(201, 160, 160, 0.12);
    }

    /* ── Draft history ── */
    .history-item {
      padding: 0.6rem 0.85rem;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: border-color 0.2s ease;
      font-size: 0.8rem;
    }
    .history-item:hover { border-color: var(--glass-border-focus); }
    .history-item .history-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.3rem;
      color: var(--text-dim);
      font-size: 0.72rem;
    }
    .history-item .history-preview {
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Incident form ── */
    .incident-toggle {
      margin-top: 0.75rem;
      text-align: center;
    }

    .incident-toggle button {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.72rem;
      cursor: pointer;
      padding: 0.3rem 0.6rem;
      transition: color 0.2s ease;
    }

    .incident-toggle button:hover { color: var(--text-dim); }

    .incident-form {
      display: none;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--glass-border);
    }

    .incident-form .field-group { margin-bottom: 0.7rem; }

    .incident-form textarea {
      min-height: 80px;
      font-family: inherit;
      font-size: 0.82rem;
    }

    .incident-form input[type="text"] {
      font-size: 0.82rem;
    }

    .hidden { display: none !important; }

    /* ── Login specific ── */
    #loginCard {
      text-align: center;
    }

    #loginCard .header {
      justify-content: center;
    }

    #loginCard .tagline {
      text-align: center;
    }

    #loginCard label {
      text-align: left;
    }

    @media (max-width: 600px) {
      body { padding: 0.75rem; }
      .card { padding: 2rem; }
      .app-container { padding: 1.5rem; }
      .field-row { flex-direction: column; gap: 0; }
      .tab-btn { font-size: 0.72rem; padding: 0.5rem 0.6rem; }
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div class="card" id="loginCard">
    <div class="header">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-3 12H7c-.55 0-1-.45-1-1s.45-1 1-1h10c.55 0 1 .45 1 1s-.45 1-1 1zm0-3H7c-.55 0-1-.45-1-1s.45-1 1-1h10c.55 0 1 .45 1 1s-.45 1-1 1zm0-3H7c-.55 0-1-.45-1-1s.45-1 1-1h10c.55 0 1 .45 1 1s-.45 1-1 1z"/></svg>
      </div>
      <h1>Support Hub</h1>
    </div>
    <p class="tagline">Third Sun Productions</p>

    <form id="loginForm">
      <div class="field-group">
        <label for="password">Team Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
      <div class="error-msg" id="loginError"></div>
    </form>
  </div>

  <!-- App -->
  <div class="app-container hidden" id="appContainer">
    <div class="header">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-3 12H7c-.55 0-1-.45-1-1s.45-1 1-1h10c.55 0 1 .45 1 1s-.45 1-1 1zm0-3H7c-.55 0-1-.45-1-1s.45-1 1-1h10c.55 0 1 .45 1 1s-.45 1-1 1zm0-3H7c-.55 0-1-.45-1-1s.45-1 1-1h10c.55 0 1 .45 1 1s-.45 1-1 1z"/></svg>
      </div>
      <h1>Support Hub</h1>
    </div>
    <p class="tagline">Draft client replies or ask the knowledge base</p>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="draft">Draft Reply</button>
      <button class="tab-btn" data-tab="qa">Ask a Question</button>
      <button class="tab-btn" data-tab="incident">Log Incident</button>
    </div>

    <!-- ═══ Draft Reply Tab ═══ -->
    <div class="tab-view active" id="draftView">
      <form id="draftForm">
        <div class="field-group">
          <label for="emailText">Client Email</label>
          <textarea id="emailText" placeholder="Paste the client's email here..." required></textarea>
        </div>

        <div class="client-badge" id="clientBadge">
          <span class="org-name" id="orgName"></span>
          <span class="org-type" id="orgType"></span>
        </div>

        <div class="field-row">
          <div class="field-group">
            <label for="clientName">Client Name <span class="auto-tag hidden" id="nameAutoTag">auto-detected</span></label>
            <input type="text" id="clientName" placeholder="e.g. Aimee" required>
          </div>
          <div class="field-group">
            <label for="siteUrl">Site URL <span class="auto-tag hidden" id="urlAutoTag">auto-detected</span></label>
            <input type="text" id="siteUrl" placeholder="e.g. uaf.org" required list="clientSuggestions">
            <datalist id="clientSuggestions"></datalist>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="draftBtn">
          <span id="draftBtnText">Draft Reply</span>
          <span class="spinner" id="draftSpinner"></span>
        </button>

<script>
  // ── DOM refs ──
  const loginCard = document.getElementById("loginCard");
  const appContainer = document.getElementById("appContainer");
  const loginForm = document.getElementById("loginForm");
  const loginBtn = document.getElementById("loginBtn");
  const loginError = document.getElementById("loginError");
  const passwordEl = document.getElementById("password");

  // Draft refs
  const draftForm = document.getElementById("draftForm");
  const draftBtn = document.getElementById("draftBtn");
  const draftBtnText = document.getElementById("draftBtnText");
  const draftSpinner = document.getElementById("draftSpinner");
  const draftError = document.getElementById("draftError");
  const emailTextEl = document.getElementById("emailText");
  const clientNameEl = document.getElementById("clientName");
  const siteUrlEl = document.getElementById("siteUrl");
  const responseArea = document.getElementById("responseArea");
  const responseContent = document.getElementById("responseContent");
  const triageBadge = document.getElementById("triageBadge");
  const copyBtn = document.getElementById("copyBtn");
  const startOverBtn = document.getElementById("startOverBtn");
  const nameAutoTag = document.getElementById("nameAutoTag");
  const urlAutoTag = document.getElementById("urlAutoTag");
  const clientBadge = document.getElementById("clientBadge");
  const orgNameEl = document.getElementById("orgName");
  const orgTypeEl = document.getElementById("orgType");
  const clientSuggestions = document.getElementById("clientSuggestions");
  const draftHistory = document.getElementById("draftHistory");
  const draftHistoryList = document.getElementById("draftHistoryList");
  const clearDraftHistoryBtn = document.getElementById("clearDraftHistoryBtn");

  // Q&A refs
  const qaForm = document.getElementById("qaForm");
  const qaBtn = document.getElementById("qaBtn");
  const qaBtnText = document.getElementById("qaBtnText");
  const qaSpinner = document.getElementById("qaSpinner");
  const qaError = document.getElementById("qaError");
  const qaQuestion = document.getElementById("qaQuestion");
  const qaResponseArea = document.getElementById("qaResponseArea");
  const qaAnswerContent = document.getElementById("qaAnswerContent");
  const qaCopyBtn = document.getElementById("qaCopyBtn");
  const qaNewQuestionBtn = document.getElementById("qaNewQuestionBtn");
  const qaHistory = document.getElementById("qaHistory");
  const qaHistoryList = document.getElementById("qaHistoryList");
  const clearQaHistoryBtn = document.getElementById("clearQaHistoryBtn");
  const categoryPills = document.getElementById("categoryPills");

  // Incident refs
  const incidentForm = document.getElementById("incidentForm");
  const incidentBtn = document.getElementById("incidentBtn");
  const incidentError = document.getElementById("incidentError");
  const incidentSuccess = document.getElementById("incidentSuccess");

  let currentAbortController = null;
  let replyAccumulator = "";
  let qaAccumulator = "";
  let clientDirectory = [];
  let selectedCategory = null;

  // ── Tabs ──
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".tab-view").forEach(v => v.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById(btn.dataset.tab + "View").classList.add("active");
    });
  });

  // ── Category pills ──
  categoryPills.addEventListener("click", (e) => {
    const pill = e.target.closest(".category-pill");
    if (!pill) return;
    if (pill.classList.contains("active")) {
      pill.classList.remove("active");
      selectedCategory = null;
    } else {
      categoryPills.querySelectorAll(".category-pill").forEach(p => p.classList.remove("active"));
      pill.classList.add("active");
      selectedCategory = pill.dataset.category;
    }
  });

  // ── Helpers ──
  function escapeHtml(str) {
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  function formatTime(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric" })
      + " " + d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
  }

  // ── Simple markdown to HTML ──
  function renderMarkdown(text) {
    let html = escapeHtml(text);
    // Headers
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    // Bold
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Links
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    // Unordered lists
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
    // Ordered lists
    html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
    // Paragraphs — wrap remaining lines
    html = html.replace(/^(?!<[hul]|<li)(.*\S.*)$/gm, '<p>$1</p>');
    // Clean up extra whitespace
    html = html.replace(/\n{2,}/g, '\n');
    return html;
  }

  // ══════════════════════════════════════════════════════
  // DRAFT REPLY — History
  // ══════════════════════════════════════════════════════
  const DRAFT_HISTORY_KEY = "support-reply-drafts";
  const MAX_HISTORY = 10;

  function saveDraft(draft) {
    try {
      const h = JSON.parse(localStorage.getItem(DRAFT_HISTORY_KEY) || "[]");
      h.unshift(draft);
      if (h.length > MAX_HISTORY) h.length = MAX_HISTORY;
      localStorage.setItem(DRAFT_HISTORY_KEY, JSON.stringify(h));
    } catch { /* localStorage full or unavailable */ }
  }

  function loadDrafts() {
    try { return JSON.parse(localStorage.getItem(DRAFT_HISTORY_KEY) || "[]"); }
    catch { return []; }
  }

  function renderDraftHistory() {
    const drafts = loadDrafts();
    if (!drafts.length) { draftHistory.style.display = "none"; return; }
    draftHistory.style.display = "block";
    draftHistoryList.innerHTML = drafts.map((d, i) => {
      const preview = d.text.slice(0, 80).replace(/\n/g, " ") + (d.text.length > 80 ? "..." : "");
      return `<div class="history-item" data-index="${i}">
        <div class="history-meta">
          <span>${escapeHtml(d.clientName)}${d.siteUrl ? " &middot; " + escapeHtml(d.siteUrl) : ""}</span>
          <span>${formatTime(d.timestamp)}</span>
        </div>
        <div class="history-preview">${escapeHtml(preview)}</div>
      </div>`;
    }).join("");
  }

  draftHistoryList.addEventListener("click", (e) => {
    const item = e.target.closest(".history-item");
    if (!item) return;
    const drafts = loadDrafts();
    const draft = drafts[parseInt(item.dataset.index, 10)];
    if (!draft) return;

    replyAccumulator = draft.text;
    responseContent.textContent = draft.text;
    responseArea.style.display = "block";
    responseArea.classList.remove("streaming");
    triageBadge.className = "triage-badge";
    if (draft.triage === "needs-troy") {
      triageBadge.textContent = "Route to Troy";
      triageBadge.classList.add("needs-troy");
    } else {
      triageBadge.textContent = "Routine";
      triageBadge.classList.add("routine");
    }
    triageBadge.style.display = "inline-flex";
    copyBtn.textContent = "Copy to Clipboard";
    copyBtn.classList.remove("copied");
    responseArea.scrollIntoView({ behavior: "smooth", block: "nearest" });
  });

  clearDraftHistoryBtn.addEventListener("click", () => {
    localStorage.removeItem(DRAFT_HISTORY_KEY);
    renderDraftHistory();
  });

  // ══════════════════════════════════════════════════════
  // Q&A — History
  // ══════════════════════════════════════════════════════
  const QA_HISTORY_KEY = "support-hub-qa";

  function saveQA(entry) {
    try {
      const h = JSON.parse(localStorage.getItem(QA_HISTORY_KEY) || "[]");
      h.unshift(entry);
      if (h.length > MAX_HISTORY) h.length = MAX_HISTORY;
      localStorage.setItem(QA_HISTORY_KEY, JSON.stringify(h));
    } catch {}
  }

  function loadQAs() {
    try { return JSON.parse(localStorage.getItem(QA_HISTORY_KEY) || "[]"); }
    catch { return []; }
  }

  function renderQaHistory() {
    const items = loadQAs();
    if (!items.length) { qaHistory.style.display = "none"; return; }
    qaHistory.style.display = "block";
    qaHistoryList.innerHTML = items.map((d, i) => {
      const preview = d.question.slice(0, 80) + (d.question.length > 80 ? "..." : "");
      return `<div class="history-item" data-index="${i}">
        <div class="history-meta">
          <span>${d.category ? escapeHtml(d.category) : "General"}</span>
          <span>${formatTime(d.timestamp)}</span>
        </div>
        <div class="history-preview">${escapeHtml(preview)}</div>
      </div>`;
    }).join("");
  }

  qaHistoryList.addEventListener("click", (e) => {
    const item = e.target.closest(".history-item");
    if (!item) return;
    const items = loadQAs();
    const entry = items[parseInt(item.dataset.index, 10)];
    if (!entry) return;

    qaAccumulator = entry.answer;
    qaAnswerContent.innerHTML = renderMarkdown(entry.answer);
    qaResponseArea.style.display = "block";
    qaResponseArea.classList.remove("streaming");
    qaCopyBtn.textContent = "Copy to Clipboard";
    qaCopyBtn.classList.remove("copied");
    qaResponseArea.scrollIntoView({ behavior: "smooth", block: "nearest" });
  });

  clearQaHistoryBtn.addEventListener("click", () => {
    localStorage.removeItem(QA_HISTORY_KEY);
    renderQaHistory();
  });

  // ══════════════════════════════════════════════════════
  // Auto-detect client name and website from pasted email
  // ══════════════════════════════════════════════════════
  function detectClientInfo(text) {
    const result = { name: null, url: null };
    const signoffPattern = /(?:thanks|thank you|sincerely|best|regards|cheers|warmly|respectfully|with gratitude)[,!]?\s*\n+\s*([A-Z][a-z]+(?:\s+[A-Z][a-z]+)?)/im;
    const signoffMatch = text.match(signoffPattern);
    if (signoffMatch) result.name = signoffMatch[1].trim();

    if (!result.name) {
      const letMeKnow = /let me know[,.]?\s*\n+\s*([A-Z][a-z]+(?:\s+[A-Z][a-z]+)?)/im;
      const lmkMatch = text.match(letMeKnow);
      if (lmkMatch) result.name = lmkMatch[1].trim();
    }

    const urlPattern = /(?:https?:\/\/)?(?:www\.)?([a-z0-9][-a-z0-9]*\.[a-z]{2,}(?:\.[a-z]{2,})?)/gi;
    const urls = [];
    let urlMatch;
    while ((urlMatch = urlPattern.exec(text)) !== null) {
      const domain = urlMatch[1].toLowerCase();
      if (!/thirdsun|gmail|yahoo|hotmail|outlook|google|stripe|scribehow/.test(domain)) urls.push(domain);
    }
    if (urls.length > 0) result.url = urls[0];
    return result;
  }

  function runDetection() {
    const text = emailTextEl.value;
    if (!text.trim()) return;
    const info = detectClientInfo(text);
    if (info.name && !clientNameEl.dataset.userEdited) {
      clientNameEl.value = info.name;
      nameAutoTag.classList.remove("hidden");
    }
    if (info.url && !siteUrlEl.dataset.userEdited) {
      siteUrlEl.value = info.url;
      urlAutoTag.classList.remove("hidden");
      lookupClient(info.url);
    }
  }

  // ── Client directory lookup ──
  async function loadClientDirectory() {
    try {
      const res = await fetch("/clients");
      if (res.ok) {
        clientDirectory = await res.json();
        clientSuggestions.innerHTML = clientDirectory
          .map(c => `<option value="${c.website}" label="${c.name}">`)
          .join("");
      }
    } catch {}
  }

  function lookupClient(urlValue) {
    if (!urlValue || !clientDirectory.length) {
      clientBadge.style.display = "none";
      clientBadge.classList.remove("no-match");
      return null;
    }
    const clean = urlValue.toLowerCase().replace(/^https?:\/\//, "").replace(/^www\./, "").replace(/\/.*$/, "").replace(/\/$/, "");
    const match = clientDirectory.find(c => {
      const cDomain = c.website.toLowerCase().replace(/^https?:\/\//, "").replace(/^www\./, "").replace(/\/.*$/, "").replace(/\/$/, "");
      if (clean === cDomain) return true;
      if (clean.endsWith("." + cDomain) || cDomain.endsWith("." + clean)) return true;
      return false;
    });
    if (match) {
      orgNameEl.textContent = match.name;
      orgTypeEl.textContent = match.type || "";
      orgTypeEl.style.display = match.type ? "inline" : "none";
      clientBadge.style.display = "flex";
      clientBadge.classList.remove("no-match");
      return match;
    } else {
      if (clean) {
        orgNameEl.textContent = "Client not found in directory";
        orgTypeEl.style.display = "none";
        clientBadge.style.display = "flex";
        clientBadge.classList.add("no-match");
      } else {
        clientBadge.style.display = "none";
        clientBadge.classList.remove("no-match");
      }
      return null;
    }
  }

  emailTextEl.addEventListener("input", runDetection);
  emailTextEl.addEventListener("paste", () => setTimeout(runDetection, 50));
  clientNameEl.addEventListener("input", () => { clientNameEl.dataset.userEdited = "true"; nameAutoTag.classList.add("hidden"); });
  siteUrlEl.addEventListener("input", () => { siteUrlEl.dataset.userEdited = "true"; urlAutoTag.classList.add("hidden"); lookupClient(siteUrlEl.value); });
  siteUrlEl.addEventListener("change", () => lookupClient(siteUrlEl.value));

  // ══════════════════════════════════════════════════════
  // Auth
  // ══════════════════════════════════════════════════════
  fetch("/auth-check")
    .then((r) => r.json())
    .then((data) => { if (data.authenticated) showApp(); else showLogin(); })
    .catch(() => showLogin());

  function showLogin() {
    loginCard.classList.remove("hidden");
    appContainer.classList.add("hidden");
    passwordEl.focus();
  }

  function showApp() {
    loginCard.classList.add("hidden");
    appContainer.classList.remove("hidden");
    emailTextEl.focus();
    loadClientDirectory();
    renderDraftHistory();
    renderQaHistory();
  }

  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    loginError.style.display = "none";
    loginBtn.disabled = true;
    try {
      const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: passwordEl.value }),
      });
      if (!res.ok) { const d = await res.json(); throw new Error(d.error || "Login failed"); }
      showApp();
    } catch (err) {
      loginError.textContent = err.message;
      loginError.style.display = "block";
    } finally { loginBtn.disabled = false; }
  });

  // ══════════════════════════════════════════════════════
  // SSE stream reader (shared)
  // ══════════════════════════════════════════════════════
  async function readSSEStream(res, onText, onDone, onError) {
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const jsonStr = line.slice(6);
        if (!jsonStr) continue;
        let data;
        try { data = JSON.parse(jsonStr); } catch { continue; }

        if (data.text) onText(data.text);
        if (data.done) onDone(data);
        if (data.error) onError(new Error(data.error));
      }
    }
  }

  // ══════════════════════════════════════════════════════
  // Draft Reply — submit
  // ══════════════════════════════════════════════════════
  draftForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const emailText = emailTextEl.value.trim();
    if (!emailText) return;

    draftError.style.display = "none";
    responseArea.style.display = "none";
    responseArea.classList.remove("streaming");
    triageBadge.style.display = "none";
    triageBadge.className = "triage-badge";
    responseContent.textContent = "";
    replyAccumulator = "";
    copyBtn.textContent = "Copy to Clipboard";
    copyBtn.classList.remove("copied");

    draftBtn.disabled = true;
    draftBtnText.textContent = "Drafting...";
    draftSpinner.style.display = "inline-block";

    if (currentAbortController) currentAbortController.abort();
    currentAbortController = new AbortController();

    try {
      const res = await fetch("/draft-reply", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: emailText,
          clientName: clientNameEl.value.trim() || undefined,
          siteUrl: siteUrlEl.value.trim() || undefined,
        }),
        signal: currentAbortController.signal,
      });

      if (!res.ok) { const d = await res.json(); throw new Error(d.error || "Request failed"); }

      responseArea.style.display = "block";
      responseArea.classList.add("streaming");

      await readSSEStream(res,
        (text) => {
          replyAccumulator += text;
          responseContent.textContent = replyAccumulator;
          responseContent.scrollTop = responseContent.scrollHeight;
        },
        (data) => {
          responseArea.classList.remove("streaming");
          if (data.triage === "needs-troy") {
            triageBadge.textContent = "Route to Troy";
            triageBadge.classList.add("needs-troy");
          } else {
            triageBadge.textContent = "Routine";
            triageBadge.classList.add("routine");
          }
          triageBadge.style.display = "inline-flex";
          saveDraft({
            clientName: clientNameEl.value.trim() || "Unknown",
            siteUrl: siteUrlEl.value.trim() || "",
            triage: data.triage || "routine",
            text: replyAccumulator,
            timestamp: Date.now(),
          });
          renderDraftHistory();
        },
        (err) => { throw err; }
      );
    } catch (err) {
      responseArea.classList.remove("streaming");
      if (err.name === "AbortError") return;
      draftError.textContent = err.message;
      draftError.style.display = "block";
    } finally {
      draftBtn.disabled = false;
      draftBtnText.textContent = "Draft Reply";
      draftSpinner.style.display = "none";
    }
  });

  // ══════════════════════════════════════════════════════
  // Q&A — submit
  // ══════════════════════════════════════════════════════
  qaForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const question = qaQuestion.value.trim();
    if (!question) return;

    qaError.style.display = "none";
    qaResponseArea.style.display = "none";
    qaResponseArea.classList.remove("streaming");
    qaAnswerContent.innerHTML = "";
    qaAccumulator = "";
    qaCopyBtn.textContent = "Copy to Clipboard";
    qaCopyBtn.classList.remove("copied");

    qaBtn.disabled = true;
    qaBtnText.textContent = "Thinking...";
    qaSpinner.style.display = "inline-block";

    if (currentAbortController) currentAbortController.abort();
    currentAbortController = new AbortController();

    try {
      const res = await fetch("/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          question,
          category: selectedCategory || undefined,
        }),
        signal: currentAbortController.signal,
      });

      if (!res.ok) { const d = await res.json(); throw new Error(d.error || "Request failed"); }

      qaResponseArea.style.display = "block";
      qaResponseArea.classList.add("streaming");

      await readSSEStream(res,
        (text) => {
          qaAccumulator += text;
          qaAnswerContent.innerHTML = renderMarkdown(qaAccumulator);
          qaAnswerContent.scrollTop = qaAnswerContent.scrollHeight;
        },
        () => {
          qaResponseArea.classList.remove("streaming");
          qaAnswerContent.innerHTML = renderMarkdown(qaAccumulator);
          saveQA({
            question,
            category: selectedCategory || null,
            answer: qaAccumulator,
            timestamp: Date.now(),
          });
          renderQaHistory();
        },
        (err) => { throw err; }
      );
    } catch (err) {
      qaResponseArea.classList.remove("streaming");
      if (err.name === "AbortError") return;
      qaError.textContent = err.message;
      qaError.style.display = "block";
    } finally {
      qaBtn.disabled = false;
      qaBtnText.textContent = "Ask";
      qaSpinner.style.display = "none";
    }
  });

  // ══════════════════════════════════════════════════════
  // Incident — submit
  // ══════════════════════════════════════════════════════
  incidentForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    incidentError.style.display = "none";
    incidentSuccess.style.display = "none";
    incidentBtn.disabled = true;

    try {
      const res = await fetch("/incidents", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          title: document.getElementById("incidentTitle").value.trim(),
          severity: document.getElementById("incidentSeverity").value.trim() || undefined,
          affected: document.getElementById("incidentAffected").value.trim() || undefined,
          description: document.getElementById("incidentDescription").value.trim(),
          resolution: document.getElementById("incidentResolution").value.trim() || undefined,
          handler: document.getElementById("incidentHandler").value.trim() || undefined,
        }),
      });

      if (!res.ok) { const d = await res.json(); throw new Error(d.error || "Failed to log incident"); }

      const data = await res.json();
      incidentSuccess.textContent = `Incident "${data.title}" logged for ${data.date}. It's now part of the knowledge base.`;
      incidentSuccess.style.display = "block";
      incidentForm.reset();
    } catch (err) {
      incidentError.textContent = err.message;
      incidentError.style.display = "block";
    } finally {
      incidentBtn.disabled = false;
    }
  });

  // ══════════════════════════════════════════════════════
  // Action buttons
  // ══════════════════════════════════════════════════════
  copyBtn.addEventListener("click", async () => {
    try { await navigator.clipboard.writeText(replyAccumulator); }
    catch {
      const ta = document.createElement("textarea");
      ta.value = replyAccumulator;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }
    copyBtn.textContent = "Copied!";
    copyBtn.classList.add("copied");
    setTimeout(() => { copyBtn.textContent = "Copy to Clipboard"; copyBtn.classList.remove("copied"); }, 2000);
  });

  startOverBtn.addEventListener("click", () => {
    responseArea.style.display = "none";
    responseArea.classList.remove("streaming");
    draftError.style.display = "none";
    emailTextEl.value = "";
    clientNameEl.value = "";
    siteUrlEl.value = "";
    delete clientNameEl.dataset.userEdited;
    delete siteUrlEl.dataset.userEdited;
    nameAutoTag.classList.add("hidden");
    urlAutoTag.classList.add("hidden");
    clientBadge.style.display = "none";
    clientBadge.classList.remove("no-match");
    replyAccumulator = "";
    responseContent.textContent = "";
    triageBadge.style.display = "none";
    triageBadge.className = "triage-badge";
    emailTextEl.focus();
  });

  qaCopyBtn.addEventListener("click", async () => {
    try { await navigator.clipboard.writeText(qaAccumulator); }
    catch {
      const ta = document.createElement("textarea");
      ta.value = qaAccumulator;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }
    qaCopyBtn.textContent = "Copied!";
    qaCopyBtn.classList.add("copied");
    setTimeout(() => { qaCopyBtn.textContent = "Copy to Clipboard"; qaCopyBtn.classList.remove("copied"); }, 2000);
  });

  qaNewQuestionBtn.addEventListener("click", () => {
    qaResponseArea.style.display = "none";
    qaResponseArea.classList.remove("streaming");
    qaError.style.display = "none";
    qaQuestion.value = "";
    qaAccumulator = "";
    qaAnswerContent.innerHTML = "";
    categoryPills.querySelectorAll(".category-pill").forEach(p => p.classList.remove("active"));
    selectedCategory = null;
    qaQuestion.focus();
  });
</script>
</body>
</html>
